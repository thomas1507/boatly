name: Deploy to Production

on:
  push:
    branches: [ "main" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    name: Build & Deploy Production
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'

    - name: Build Binary
      run: |
        GOOS=linux GOARCH=amd64 go build -o boatly-server cmd/server/main.go
        echo "✅ Binary built successfully"
        ls -lh boatly-server

    - name: Copy to Production Server
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.HOST }}
        username: ${{ secrets.USERNAME }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        source: "boatly-server,static/"
        target: "/home/${{ secrets.USERNAME }}/apps/boatly/"

    - name: Restart Production Service
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.HOST }}
        username: ${{ secrets.USERNAME }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          cd /home/${{ secrets.USERNAME }}/apps/boatly/
          chmod +x boatly-server
          sudo systemctl restart boatly
          echo "✅ Production deployed successfully to https://boatly.nl"
          sudo systemctl status boatly --no-pager
